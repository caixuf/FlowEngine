name: FlowEngine CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Nightly (02:00 UTC) + manual trigger: run the long stability + benchmark
  # suites and the optional scenario-regression track (B2) that are excluded
  # from per-PR runs to keep pull-request CI fast.
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

# Least-privilege default for GITHUB_TOKEN across all jobs (read-only checkout).
permissions:
  contents: read

jobs:
  # ── clock_service enforcement gate ─────────────────────────
  # clock_service.h must be the only time source for nodes. Raw
  # clock_gettime(CLOCK_MONOTONIC) in modules/ bypasses sim-time injection
  # (bag replay), breaking deterministic playback. This gate fails any PR that
  # reintroduces the raw call in a node plugin — nodes must use clock_now_us().
  # NOTE: src/core/clock_service.c itself is the legitimate single call site
  # (inside clock_now_us) and lives outside modules/, so it is not scanned.
  clock-service-gate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Reject clock_gettime(CLOCK_MONOTONIC) in modules/
        run: |
          set -e
          if grep -rnE 'clock_gettime[[:space:]]*\([[:space:]]*CLOCK_MONOTONIC' modules/ ; then
            echo "::error::Forbidden: modules/ must use clock_now_us() from clock_service.h, not clock_gettime(CLOCK_MONOTONIC). See skills/06_clock_service.md."
            exit 1
          fi
          echo "✓ modules/ uses clock_now_us() exclusively"

  # ── Standard build + test (Release) ────────────────────────
  build-release:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libcjson-dev python3
      - name: Configure (Release)
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build -j$(nproc)
      - name: Test
        run: ctest --test-dir build --output-on-failure --timeout 60 -LE "benchmark|manual|stability|integration"

  # ── Debug build ────────────────────────────────────────────
  build-debug:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libcjson-dev python3
      - name: Configure (Debug)
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug
      - name: Build
        run: cmake --build build -j$(nproc)
      - name: Test
        run: ctest --test-dir build --output-on-failure --timeout 60 -LE "benchmark|manual|stability|integration"

  # ── ASAN (Address Sanitizer) ───────────────────────────────
  build-asan:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libcjson-dev python3
      - name: Configure (ASAN)
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DENABLE_ASAN=ON
      - name: Build
        run: cmake --build build -j$(nproc)
      - name: Test
        run: ctest --test-dir build --output-on-failure --timeout 120 -LE "benchmark|manual|stability|integration"
        env:
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=0:log_path=/tmp/asan.log
      - name: Check ASAN log
        run: |
          if ls /tmp/asan.log.* 2>/dev/null; then
            echo "⚠ ASAN reports found (continuing — halt_on_error=0)"
            cat /tmp/asan.log.*
          else
            echo "✓ No ASAN issues"
          fi

  # ── TSAN (Thread Sanitizer) ────────────────────────────────
  # 暂时禁用：协程 + 无锁内存池的跨线程同步模式对 TSAN 产生大量
  # 假阳性（frame_done_ 自旋、CAS freelist 等）。ASAN/UBSAN 已
  # 覆盖内存安全，TSAN 待协程生命周期稳定后重新启用。
  # build-tsan:
  #   runs-on: ubuntu-24.04
  #   steps:
  #     - uses: actions/checkout@v4
  #     - name: Install dependencies
  #       run: sudo apt-get update -qq && sudo apt-get install -y -qq libcjson-dev python3
  #     - name: Configure (TSAN)
  #       run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DENABLE_TSAN=ON
  #     - name: Build
  #       run: cmake --build build -j$(nproc)
  #     - name: Test
  #       run: ctest --test-dir build --output-on-failure --timeout 180
  #       env:
  #         TSAN_OPTIONS: halt_on_error=0:history_size=7:second_deadlock_stack=1

  # ── UBSAN (Undefined Behavior Sanitizer) ───────────────────
  build-ubsan:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libcjson-dev python3
      - name: Configure (UBSAN)
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DENABLE_UBSAN=ON
      - name: Build
        run: cmake --build build -j$(nproc)
      - name: Test
        run: ctest --test-dir build --output-on-failure --timeout 120 -LE "benchmark|manual|stability|integration"

  # ── Stress test ────────────────────────────────────────────
  # Runs the full plugin pipeline (flow_launcher + config/pipeline.json) under
  # a 15-second time budget to stress the core bus + scheduler + transport at
  # realistic ADAS rates.  Equivalent to the integration-test job but with a
  # shorter duration and no ctest assertions — purely a "does it survive 15s
  # of high-rate pipeline traffic without crashing" gate.
  stress-test:
    runs-on: ubuntu-24.04
    needs: build-release
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libcjson-dev python3 libeigen3-dev
      - name: Configure (Release)
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build framework
        run: cmake --build build -j$(nproc)
      - name: Build node plugins
        run: |
          cmake -B build/modules/adas_nodes -S modules/adas_nodes -DFLOWENGINE_BUILD="$PWD/build"
          cmake --build build/modules/adas_nodes -j$(nproc)
      - name: Stress test (15s pipeline run)
        run: timeout 35 ./build/bin/flow_launcher config/pipeline.json --duration 15
      - name: Verify
        run: echo "✓ Stress test completed — no crash"

  # ── Integration test: multi-node pipeline via flow_launcher ─
  # Builds the separate adas_nodes .so plugin subproject and verifies that
  # flow_launcher loads every node (dlopen + ABI check) and runs the pipeline.
  integration-test:
    runs-on: ubuntu-24.04
    needs: build-release
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libcjson-dev python3 libeigen3-dev
      - name: Configure (Release)
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build framework
        run: cmake --build build -j$(nproc)
      - name: Build node plugins
        run: |
          cmake -B build/modules/adas_nodes -S modules/adas_nodes -DFLOWENGINE_BUILD="$PWD/build"
          cmake --build build/modules/adas_nodes -j$(nproc)
      - name: Run integration smoke (ctest -L integration)
        run: ctest --test-dir build --output-on-failure -L integration

  # ── Coverage ───────────────────────────────────────────────
  coverage:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libcjson-dev python3 lcov
      - name: Configure (Coverage)
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DENABLE_COVERAGE=ON
      - name: Build
        run: cmake --build build -j$(nproc)
      - name: Test
        run: ctest --test-dir build --output-on-failure --timeout 360 -LE "benchmark|manual|stability|integration"
      - name: Generate coverage
        run: |
          lcov --capture --directory build --output-file coverage.info --ignore-errors mismatch,empty,unused,negative
          lcov --remove coverage.info '/usr/*' '*/_deps/*' '*/build/*' --output-file coverage.info --ignore-errors unused,empty
          lcov --list coverage.info --ignore-errors unused

  # ── Visualization layer (flowmond) + algorithm regression ──
  # Builds flowmond (the C dashboard daemon that replaced flowboard_server.py)
  # and runs the pytest suite under tools/tests/ (control-node curve-fallback
  # regression etc.). The flowmond HTTP API is smoke-tested directly.
  viz:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libcjson-dev
          python -m pip install --upgrade pip -q
          pip install -q -r tools/tests/requirements-dev.txt
      - name: Configure (Release)
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build flowmond
        run: cmake --build build --target flowmond -j$(nproc)
      - name: Algorithm regression tests (pytest)
        run: python -m pytest tools/tests -v
      - name: flowmond smoke test
        run: |
          ./build/bin/flowmond --port 8811 --html-path tools/flowboard/index.html &
          SRV=$!
          sleep 2
          curl -sf http://localhost:8811/api/health | tee /tmp/health.json
          echo
          curl -sf http://localhost:8811/api/topology > /tmp/topo.json
          kill $SRV 2>/dev/null || true

  # ── vis/ JS smoke tests (pure Node, no browser) ───────────
  # 2026-07 重建：新增 THREE shim + 全量模块加载 + tick 冒烟 + ESLint 门禁。
  # 与 C 侧 demo_evaluator.py 对称 —— 任何 tools/flowboard/** 改动
  # 必须通过此 job，否则不合并。
  vis-js-tests:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Syntax check all vis/ modules
        run: |
          set -e
          for f in $(find tools/flowboard/js/vis -name '*.js'); do
            node --check "$f"
          done
          for f in $(find tools/flowboard/js -maxdepth 1 -name '*.js'); do
            node --check "$f"
          done
      # ── 门禁 1: 全量模块加载（抓语法错/顶层 ReferenceError/import 路径）──
      - name: Module load smoke (26 vis/ modules)
        run: |
          set -e
          node --import ./tests/support/three-preload.mjs tests/vis_module_load.test.mjs
      # ── 门禁 2: ESLint no-undef (error) + no-unused-vars (warn) ──
      - name: ESLint no-undef + no-unused-vars
        run: |
          set -e
          npx eslint -c tools/flowboard/eslint.config.mjs tools/flowboard/js/vis/
      # ── 门禁 3: 单帧 tick 冒烟（3 场景 × tickAnimation） ──
      - name: Render tick smoke (3 scenarios)
        run: |
          set -e
          node --import ./tests/support/three-preload.mjs tests/vis_render_tick.test.mjs
      # ── 全量 JS 门禁（与 npm run vis:check:all 一致，作者本地同命令） ──
      - name: Run vis smoke tests (vis:check:all)
        run: npm run vis:check:all

  # ── Nightly long-running suite (stability + benchmark) ─────
  # These tests are labeled manual/stability/benchmark and are excluded from
  # per-PR runs to keep pull-request CI fast. They run on the nightly schedule.
  nightly-stability:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libcjson-dev python3
      - name: Configure (Release)
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build -j$(nproc)
      - name: Long-running tests (stability + benchmark)
        run: ctest --test-dir build --output-on-failure --timeout 900 -L "stability|benchmark"

  # ── Algorithm evaluator (regression gate) ─────────────────────
  # Runs the full plugin pipeline (demo.sh) and scores it against
  # pass_criteria.  A FAIL blocks the PR — this is the quality gate
  # for any change touching the ADAS pipeline chain.
  evaluator:
    runs-on: ubuntu-24.04
    needs: build-release
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libcjson-dev python3 libeigen3-dev
      - name: Configure (Release)
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build framework
        run: cmake --build build -j$(nproc)
      - name: Build node plugins
        run: |
          cmake -B build/modules/adas_nodes -S modules/adas_nodes -DFLOWENGINE_BUILD="$PWD/build"
          cmake --build build/modules/adas_nodes -j$(nproc)
      - name: Regression evaluator (45s demo)
        run: python3 tools/demo_evaluator.py --duration 45 --interval 0.5

  # ── Scenario-matrix regression vs baseline (B2 收尾) ────────
  # Runs the full scenario suite (8 scenarios, one simulation each) and diffs
  # numeric summaries against tests/baseline/.  Expensive (~10 min), so it
  # only runs on the nightly schedule or when triggered manually.
  scenario-regression:
    runs-on: ubuntu-24.04
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libcjson-dev python3 libeigen3-dev
      - name: Configure (Release)
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build framework
        run: cmake --build build -j$(nproc)
      - name: Build node plugins
        run: |
          cmake -B build/modules/adas_nodes -S modules/adas_nodes -DFLOWENGINE_BUILD="$PWD/build"
          cmake --build build/modules/adas_nodes -j$(nproc)
      - name: Scenario regression vs baseline
        run: python3 tools/scenario_regression.py --baseline
