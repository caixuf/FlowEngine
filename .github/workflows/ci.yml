name: FlowEngine CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege default for GITHUB_TOKEN across all jobs (read-only checkout).
permissions:
  contents: read

jobs:
  # ── Standard build + test (Release) ────────────────────────
  build-release:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libcjson-dev python3
      - name: Configure (Release)
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build -j$(nproc)
      - name: Test
        run: ctest --test-dir build --output-on-failure --timeout 60 -LE "benchmark|integration"

  # ── Debug build ────────────────────────────────────────────
  build-debug:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libcjson-dev python3
      - name: Configure (Debug)
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug
      - name: Build
        run: cmake --build build -j$(nproc)
      - name: Test
        run: ctest --test-dir build --output-on-failure --timeout 60 -LE "benchmark|integration"

  # ── ASAN (Address Sanitizer) ───────────────────────────────
  build-asan:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libcjson-dev python3
      - name: Configure (ASAN)
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DENABLE_ASAN=ON
      - name: Build
        run: cmake --build build -j$(nproc)
      - name: Test
        run: ctest --test-dir build --output-on-failure --timeout 120 -LE "benchmark|integration"
        env:
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=0:log_path=/tmp/asan.log
      - name: Check ASAN log
        run: |
          if ls /tmp/asan.log.* 2>/dev/null; then
            echo "⚠ ASAN reports found (continuing — halt_on_error=0)"
            cat /tmp/asan.log.*
          else
            echo "✓ No ASAN issues"
          fi

  # ── TSAN (Thread Sanitizer) ────────────────────────────────
  # 暂时禁用：协程 + 无锁内存池的跨线程同步模式对 TSAN 产生大量
  # 假阳性（frame_done_ 自旋、CAS freelist 等）。ASAN/UBSAN 已
  # 覆盖内存安全，TSAN 待协程生命周期稳定后重新启用。
  # build-tsan:
  #   runs-on: ubuntu-24.04
  #   steps:
  #     - uses: actions/checkout@v4
  #     - name: Install dependencies
  #       run: sudo apt-get update -qq && sudo apt-get install -y -qq libcjson-dev python3
  #     - name: Configure (TSAN)
  #       run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DENABLE_TSAN=ON
  #     - name: Build
  #       run: cmake --build build -j$(nproc)
  #     - name: Test
  #       run: ctest --test-dir build --output-on-failure --timeout 180
  #       env:
  #         TSAN_OPTIONS: halt_on_error=0:history_size=7:second_deadlock_stack=1

  # ── UBSAN (Undefined Behavior Sanitizer) ───────────────────
  build-ubsan:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libcjson-dev python3
      - name: Configure (UBSAN)
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DENABLE_UBSAN=ON
      - name: Build
        run: cmake --build build -j$(nproc)
      - name: Test
        run: ctest --test-dir build --output-on-failure --timeout 120 -LE "benchmark|integration"

  # ── Stress test ────────────────────────────────────────────
  stress-test:
    runs-on: ubuntu-24.04
    needs: build-release
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libcjson-dev python3
      - name: Configure (Release)
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build -j$(nproc)
      - name: Stress test (15s at high rate)
        run: timeout 35 ./build/bin/flow_e2e 15
      - name: Verify
        run: echo "✓ Stress test completed — no crash"

  # ── Integration test: multi-node pipeline via flow_launcher ─
  # Builds the separate adas_nodes .so plugin subproject and verifies that
  # flow_launcher loads every node (dlopen + ABI check) and runs the pipeline.
  integration-test:
    runs-on: ubuntu-24.04
    needs: build-release
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libcjson-dev python3
      - name: Configure (Release)
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build framework
        run: cmake --build build -j$(nproc)
      - name: Build node plugins
        run: |
          cmake -B build/modules/adas_nodes -S modules/adas_nodes -DFLOWENGINE_BUILD="$PWD/build"
          cmake --build build/modules/adas_nodes -j$(nproc)
      - name: Run integration smoke (ctest -L integration)
        run: ctest --test-dir build --output-on-failure -L integration

  # ── Coverage ───────────────────────────────────────────────
  coverage:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libcjson-dev python3 lcov
      - name: Configure (Coverage)
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DENABLE_COVERAGE=ON
      - name: Build
        run: cmake --build build -j$(nproc)
      - name: Test
        run: ctest --test-dir build --output-on-failure --timeout 360 -LE "benchmark|integration"
      - name: Generate coverage
        run: |
          lcov --capture --directory build --output-file coverage.info --ignore-errors mismatch,empty,unused,negative
          lcov --remove coverage.info '/usr/*' '*/_deps/*' '*/build/*' --output-file coverage.info --ignore-errors unused,empty
          lcov --list coverage.info --ignore-errors unused

  # ── Visualization layer (FlowBoard) tests ──────────────────
  # Tests the Python dashboard server + data-contract without needing the full
  # C pipeline. Runs in --demo mode so it is fast and deterministic in CI.
  viz:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip -q
          pip install -q -r tools/tests/requirements-dev.txt
      - name: Run FlowBoard tests (normalize + HTTP + contract)
        run: python -m pytest tools/tests -v
      - name: Server smoke test (--demo)
        run: |
          python3 tools/flowboard_server.py --demo --port 8811 --log-level warning &
          SRV=$!
          sleep 2
          curl -sf http://localhost:8811/api/health | tee /tmp/health.json
          echo
          curl -sf http://localhost:8811/api/topology > /tmp/topo.json
          python3 -c "import json;d=json.load(open('/tmp/topo.json'));assert d['source']=='demo';assert len(d['nodes'])>0;print('✓ demo topology OK')"
          kill $SRV 2>/dev/null || true

  # ── Algorithm evaluator (regression gate) ─────────────────────
  # Runs the full plugin pipeline (demo.sh) and scores it against
  # pass_criteria.  A FAIL blocks the PR — this is the quality gate
  # for any change touching the ADAS pipeline chain.
  evaluator:
    runs-on: ubuntu-24.04
    needs: build-release
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libcjson-dev python3
      - name: Configure (Release)
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build framework
        run: cmake --build build -j$(nproc)
      - name: Build node plugins
        run: |
          cmake -B build/modules/adas_nodes -S modules/adas_nodes -DFLOWENGINE_BUILD="$PWD/build"
          cmake --build build/modules/adas_nodes -j$(nproc)
      - name: Regression evaluator (45s demo)
        run: python3 tools/demo_evaluator.py --duration 45 --interval 0.5
