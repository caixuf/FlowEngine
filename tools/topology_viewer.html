<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlowEngine Topology</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:#0a0e17;color:#c9d1d9;display:flex;height:100vh;overflow:hidden}
#panel{width:340px;background:#131822;padding:20px;display:flex;flex-direction:column;gap:14px;border-right:1px solid #21262d;z-index:10;overflow-y:auto}
h1{font-size:16px;font-weight:600;color:#58a6ff;display:flex;align-items:center;gap:8px}
h1 span{font-size:12px;color:#8b949e;font-weight:400}
h2{font-size:12px;color:#8b949e;text-transform:uppercase;letter-spacing:.5px;margin-top:4px}
textarea{width:100%;height:180px;background:#0d1117;color:#c9d1d9;border:1px solid #30363d;border-radius:6px;padding:10px;font:11px 'JetBrains Mono',monospace;resize:vertical;outline:none}
textarea:focus{border-color:#58a6ff}
button{background:#21262d;color:#c9d1d9;border:1px solid #30363d;padding:7px 14px;border-radius:6px;cursor:pointer;font-size:12px;transition:.15s}
button:hover{background:#30363d;border-color:#58a6ff}
button.primary{background:#1f6feb;border-color:#1f6feb;color:white}
button.primary:hover{background:#388bfd}
#graph{flex:1;cursor:grab}
#graph:active{cursor:grabbing}
svg text{font-family:'Inter',system-ui,sans-serif;pointer-events:none}
.tooltip{position:absolute;background:#1c2128;border:1px solid #30363d;border-radius:8px;padding:10px 14px;font-size:11px;pointer-events:none;opacity:0;transition:opacity .2s;max-width:260px;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.tooltip .name{color:#58a6ff;font-weight:600;font-size:13px;margin-bottom:4px}
.tooltip .kv{display:flex;justify-content:space-between;gap:12px;line-height:1.6}
.tooltip .k{color:#8b949e}.tooltip .v{color:#c9d1d9;text-align:right}
.link{stroke:#21262d;stroke-width:1.5;fill:none}
.link-label{font-size:9px;fill:#484f58}
.legend{display:flex;gap:10px;flex-wrap:wrap;font-size:11px}
.legend span{display:flex;align-items:center;gap:5px}
.dot{width:9px;height:9px;border-radius:50%;display:inline-block}
.stat{display:flex;justify-content:space-between;font-size:12px;line-height:1.8;border-bottom:1px solid #21262d}
.file-btn{cursor:pointer}
</style>
</head>
<body>
<div id="panel">
  <h1>🔗 FlowEngine Topo <span>v2</span></h1>
  <textarea id="input" placeholder='{"nodes":[...]}  — 粘贴 discovery JSON 或拖拽文件'></textarea>
  <div style="display:flex;gap:8px">
    <button class="primary" onclick="loadText()" style="flex:1">🔄 Render</button>
    <button onclick="loadSample()">📋 Demo</button>
    <label class="file-btn"><button>📂</button><input type="file" accept=".json" onchange="loadFile(event)" style="display:none"></label>
    <button onclick="clearAll()" style="color:#f85149">✕</button>
  </div>
  <h2>Stats</h2>
  <div id="stats"></div>
  <h2>Legend</h2>
  <div class="legend">
    <span><span class="dot" style="background:#3fb950"></span>Pub</span>
    <span><span class="dot" style="background:#58a6ff"></span>Sub</span>
    <span><span class="dot" style="background:#d29922"></span>Service</span>
    <span><span class="dot" style="background:#bc8cff"></span>Fusion</span>
    <span style="opacity:.4"><span class="dot" style="background:#484f58"></span>Dead</span>
  </div>
  <div style="font-size:10px;color:#484f58;margin-top:auto">
    Drag nodes · Scroll zoom · DblClick node=show topics · Ctrl+click=pin
  </div>
</div>
<div id="graph"></div>
<div class="tooltip" id="tooltip"></div>

<script>
const colors = {1:'#3fb950',2:'#58a6ff',4:'#d29922',8:'#bc8cff',0:'#f85149'};
let data = null;

const svg = d3.select('#graph').append('svg').attr('width','100%').attr('height','100%');
const g = svg.append('g');
const tip = d3.select('#tooltip');

const zoom = d3.zoom().scaleExtent([0.1,4]).on('zoom',e=>g.attr('transform',e.transform));
svg.call(zoom);

const sim = d3.forceSimulation()
  .force('link',d3.forceLink().id(d=>d.id).distance(180))
  .force('charge',d3.forceManyBody().strength(-400))
  .force('center',d3.forceCenter(0,0))
  .force('collision',d3.forceCollide(45))
  .on('tick',tick);

let linkG, nodeG, linkLabelG;

function loadText(){try{render(JSON.parse(d3.select('#input').node().value.trim()))}catch(e){alert('Invalid JSON')}}
function loadFile(e){const r=new FileReader();r.onload=()=>{d3.select('#input').node().value=r.result;loadText()};r.readAsText(e.target.files[0])}
function clearAll(){d3.select('#input').node().value='';g.selectAll('*').remove();d3.select('#stats').html('');data=null}

function loadSample(){
  d3.select('#input').node().value = JSON.stringify({
    nodes:[
      {name:"perception",pid:1001,alive:true,caps:1,topics:[{topic:"sensor/lidar",freq:10},{topic:"sensor/gps",freq:5}]},
      {name:"radar",pid:1005,alive:true,caps:1,topics:[{topic:"sensor/radar",freq:20}]},
      {name:"fusion",pid:1002,alive:true,caps:9,topics:[{topic:"sensor/lidar",freq:0},{topic:"sensor/gps",freq:0},{topic:"sensor/radar",freq:0},{topic:"fusion/objects",freq:10}]},
      {name:"control",pid:1003,alive:true,caps:2,topics:[{topic:"fusion/objects",freq:0},{topic:"control/cmd",freq:0}]},
      {name:"planning",pid:1004,alive:false,caps:2,topics:[{topic:"fusion/objects",freq:0}]}
    ]},null,2);
  loadText();
}

function getColor(d){return d.alive===false?'#484f58':(colors[d.caps&8?8:d.caps&4?4:d.caps&2?2:d.caps&1?1:0]||'#8b949e')}
function getName(d){return d.name||'?'}

function render(json){
  data = json;
  g.selectAll('*').remove();
  const ns = (json.nodes||[]).map((n,i)=>({...n,id:i,x:0,y:0}));
  if(!ns.length) return;

  // Build edges: shared topics between nodes
  const links=[];
  for(let i=0;i<ns.length;i++)for(let j=i+1;j<ns.length;j++){
    const shared = ns[i].topics.filter(ti=>ns[j].topics.some(tj=>tj.topic===ti.topic));
    shared.forEach(t=>links.push({source:i,target:j,topic:t.topic}));
  }

  // Links
  linkG = g.append('g').selectAll('line').data(links).join('line').attr('class','link');
  linkLabelG = g.append('g').selectAll('text').data(links).join('text')
    .attr('class','link-label').text(d=>d.topic.split('/').pop());

  // Nodes
  nodeG = g.append('g').selectAll('g').data(ns).join('g').call(
    d3.drag().on('start',(e,d)=>{if(!e.sourceEvent.ctrlKey){sim.alphaTarget(0.3).restart();d.fx=d.x;d.fy=d.y}})
      .on('drag',(e,d)=>{d.fx=e.x;d.fy=e.y})
      .on('end',(e,d)=>{if(!e.sourceEvent.ctrlKey){d.fx=null;d.fy=null}})
  );

  nodeG.append('circle').attr('r',22).attr('fill',getColor).attr('stroke','#21262d').attr('stroke-width',2)
    .on('mouseover',(e,d)=>{
      nodeG.selectAll('circle').attr('opacity',.3);
      d3.select(e.target).attr('opacity',1).attr('stroke','#58a6ff').attr('stroke-width',3);
      const topics = (d.topics||[]).map(t=>`<div class="kv"><span class="k">${t.topic}</span><span class="v">${t.freq>0?t.freq+'Hz':(d.caps&1?'pub':'sub')}</span></div>`).join('');
      tip.html(`<div class="name">${d.name}</div><div class="kv"><span class="k">PID</span><span class="v">${d.pid||'?'}</span></div><div class="kv"><span class="k">Status</span><span class="v">${d.alive===false?'💀 Dead':'🟢 Alive'}</span></div>${topics}`)
        .style('left',(e.pageX+15)+'px').style('top',(e.pageY-10)+'px').style('opacity',1);
    })
    .on('mouseout',(e,d)=>{
      nodeG.selectAll('circle').attr('opacity',1).attr('stroke','#21262d').attr('stroke-width',2);
      tip.style('opacity',0);
    })
    .on('dblclick',(e,d)=>{d3.select('#input').node().value=JSON.stringify(d.topics,null,2)});

  nodeG.append('text').text(getName).attr('text-anchor','middle').attr('dy',32).attr('fill','#c9d1d9').attr('font-size','10px');
  nodeG.append('text').text(d=>`PID ${d.pid}`).attr('text-anchor','middle').attr('dy',44).attr('fill','#484f58').attr('font-size','9px');

  // Simulation
  sim.nodes(ns);
  sim.force('link').links(links);
  sim.alpha(1).restart();

  // Stats
  const alive = ns.filter(n=>n.alive!==false).length;
  const edges = links.length;
  d3.select('#stats').html(`
    <div class="stat"><span>Nodes</span><span style="color:#58a6ff;font-weight:600">${ns.length}</span></div>
    <div class="stat"><span>Alive</span><span style="color:#3fb950">${alive}</span></div>
    <div class="stat"><span>Dead</span><span style="color:#f85149">${ns.length-alive}</span></div>
    <div class="stat"><span>Connections</span><span>${edges}</span></div>
    <div class="stat"><span>Topics</span><span>${new Set(links.map(l=>l.topic)).size}</span></div>
  `);

  // Center
  setTimeout(()=>{svg.transition().duration(750).call(zoom.transform,d3.zoomIdentity.translate(400,300))},100);
}

function tick(){
  linkG.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
  linkLabelG.attr('x',d=>(d.source.x+d.target.x)/2).attr('y',d=>(d.source.y+d.target.y)/2-6);
  nodeG.attr('transform',d=>`translate(${d.x},${d.y})`);
}

loadSample();
</script>
</body>
</html>
