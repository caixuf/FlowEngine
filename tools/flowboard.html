<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>FlowBoard — Live Monitor</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#090c10;color:#c9d1d9;font:13px 'Inter',system-ui,sans-serif;display:flex;height:100vh;overflow:hidden}
#sidebar{width:280px;background:#0b0f16;border-right:1px solid#1a1f2b;display:flex;flex-direction:column;gap:10px;padding:16px 14px;overflow-y:auto;z-index:10;flex-shrink:0}
#main{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
#header{background:linear-gradient(135deg,#0d1117 0%,#161b22 50%,#0d1117 100%);border-bottom:1px solid#1a1f2b;padding:10px 20px;display:flex;align-items:center;gap:16px;z-index:5}
#header h1{font-size:16px;font-weight:700;background:linear-gradient(135deg,#58a6ff,#bc8cff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;display:flex;align-items:center;gap:8px}
#header h1 .icon{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,#1f6feb,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:14px;-webkit-text-fill-color:white}
.pill{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:.3px}
.pill-live{background:linear-gradient(135deg,#0d3320,#1a4d30);color:#3fb950;border:1px solid#1a5c38}
.pill-dead{background:linear-gradient(135deg,#330d0d,#4d1a1a);color:#f85149;border:1px solid#5c1a1a}
.pill-warn{background:linear-gradient(135deg,#33220d,#4d351a);color:#d29922;border:1px solid#5c401a}
.card{background:linear-gradient(180deg,#111820,#0d1117);border:1px solid#1a1f2b;border-radius:10px;overflow:hidden;transition:border-color .2s}
.card:hover{border-color:#252d3a}
.card-header{padding:10px 14px;border-bottom:1px solid#1a1f2b;display:flex;align-items:center;justify-content:space-between;background:#0d1117}
.card-header h2{font-size:11px;font-weight:600;color:#8b949e;text-transform:uppercase;letter-spacing:.8px;display:flex;align-items:center;gap:6px}
.card-header h2 .dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.card-body{padding:10px 14px}
#topo{width:100%;height:420px;background:#090c10;position:relative}
#topo svg{width:100%;height:100%}
#frames,#process-topics{max-height:280px;overflow-y:auto;font:10px 'JetBrains Mono',monospace}
#charts{display:flex;gap:8px}
.chart-box{flex:1;min-width:250px;height:200px;background:#090c10;border:1px solid#1a1f2b;border-radius:10px;overflow:hidden;position:relative}
.chart-box canvas{width:100%;height:100%;display:block}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid#0d1117;font-size:12px}
.stat-row .label{color:#8b949e;font-size:11px}
.stat-row .value{font-weight:700;font-size:13px;color:#58a6ff}
.stat-row .value.green{color:#3fb950}.stat-row .value.red{color:#f85149}.stat-row .value.yellow{color:#d29922}
button,input{background:#161b22;color:#c9d1d9;border:1px solid#252d3a;padding:7px 14px;border-radius:6px;cursor:pointer;font-size:11px;font-weight:500;transition:all .15s}
button:hover{background:#1c2330;border-color:#303d54}
button.primary{background:linear-gradient(135deg,#1f6feb,#388bfd);border-color:#1f6feb;color:white;font-weight:600}
button.primary:hover{background:linear-gradient(135deg,#388bfd,#58a6ff)}
input{width:100%;padding:7px 10px;font:11px 'JetBrains Mono',monospace;border-radius:6px;outline:none;transition:border-color .15s}
input:focus{border-color:#58a6ff}
#msg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#30363d;font-size:13px;pointer-events:none}
.link{stroke:#1a1f2b;stroke-width:1.5;fill:none}
.frame-line{display:flex;gap:8px;padding:2px 10px;border-bottom:1px solid#0d1117;white-space:nowrap;font-size:10px;align-items:center}
.frame-line:hover{background:#111820}
.role{display:inline-block;min-width:42px;text-align:center;border-radius:12px;padding:2px 8px;font-size:9px;font-weight:700;letter-spacing:.3px}
.role-pub{background:#0d3320;color:#3fb950;border:1px solid#1a5c38}
.role-sub{background:#0d2140;color:#58a6ff;border:1px solid#1a3a6e}
.role-pubsub{background:#1f1440;color:#bc8cff;border:1px solid#3a1a6e}
.role-unknown{background:#161b22;color:#484f58}
.topic-full{color:#58a6ff;font-weight:500}.muted{color:#484f58}.mono{font-family:'JetBrains Mono',monospace}
.metric-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.mini-stat{background:#0d1117;border-radius:6px;padding:8px 10px;text-align:center}
.mini-stat .val{font-size:18px;font-weight:800;color:#58a6ff;line-height:1.2}
.mini-stat .lbl{font-size:9px;color:#8b949e;margin-top:2px;text-transform:uppercase;letter-spacing:.3px}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:#0d1117}::-webkit-scrollbar-thumb{background:#1a1f2b;border-radius:3px}
</style>
</head>
<body>
<div id="sidebar">
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
    <div class="icon" style="width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#1f6feb,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:16px">⚡</div>
    <div><div style="font-weight:700;font-size:15px;background:linear-gradient(135deg,#58a6ff,#bc8cff);-webkit-background-clip:text;-webkit-text-fill-color:transparent">FlowBoard</div>
    <div style="font-size:9px;color:#484f58">Live Monitor</div></div>
  </div>
  <span id="conn-dot" class="pill pill-dead" style="align-self:flex-start">● offline</span>

  <div style="margin-top:4px">
    <input id="url" value="http://localhost:8800" placeholder="Monitor server URL">
    <div style="display:flex;gap:4px;margin-top:4px">
      <button onclick="doConnect()" class="primary" style="flex:1">🔗 Connect</button>
      <button onclick="doSimulate()" style="flex:1">📋 Demo</button>
    </div>
  </div>

  <input id="topic-filter" placeholder="Filter: sensor/lidar,control/cmd" oninput="updateAll()">

  <div style="display:flex;gap:4px">
    <button onclick="doPause()" id="pause-btn" style="flex:1">⏯ Pause</button>
    <button onclick="clearFrames()" style="flex:1">🗑 Clear</button>
  </div>

  <div class="card"><div class="card-header"><h2>📊 Bus Stats</h2></div>
    <div class="card-body"><div class="metric-grid">
      <div class="mini-stat"><div class="val" id="m-pub">0</div><div class="lbl">Published</div></div>
      <div class="mini-stat"><div class="val" id="m-del">0</div><div class="lbl">Delivered</div></div>
      <div class="mini-stat"><div class="val" id="m-drop">0</div><div class="lbl">Dropped</div></div>
      <div class="mini-stat"><div class="val" id="m-lat">0</div><div class="lbl">Latency µs</div></div>
    </div></div>
  </div>

  <div class="card"><div class="card-header"><h2>🟢 Nodes</h2></div>
    <div class="card-body"><div id="node-status"><span style="color:#484f58">No data</span></div></div>
  </div>

  <div style="font-size:10px;color:#30363d;margin-top:auto">
    Nodes: <b id="node-n">0</b> · Frames: <b id="frame-n">0</b> · Rate: <b id="rate-n">0</b>/s
  </div>
</div>

<div id="main">
  <div class="row" style="display:flex;gap:12px">
    <div style="flex:3;min-width:500px">
      <div class="card"><div class="card-header"><h2><span class="dot" style="background:#58a6ff"></span>Topology Graph</h2></div>
        <div id="topo"><div id="msg">Press Connect or Demo to load</div></div></div>
    </div>
    <div style="flex:2;min-width:350px;display:flex;flex-direction:column;gap:12px">
      <div class="card"><div class="card-header"><h2><span class="dot" style="background:#d29922"></span>Topic QoS</h2></div>
        <div class="card-body" id="topic-stats" style="max-height:200px;overflow-y:auto"><span style="color:#484f58">No data</span></div></div>
      <div class="card" style="flex:1"><div class="card-header"><h2><span class="dot" style="background:#3fb950"></span>Frame Monitor</h2></div>
        <div id="frames" style="max-height:180px;overflow-y:auto"><span style="color:#484f58;padding:10px">No data</span></div></div>
    </div>
  </div>

  <div class="card"><div class="card-header"><h2><span class="dot" style="background:#bc8cff"></span>Process / Topic Matrix</h2></div>
    <div id="process-topics" style="max-height:200px;overflow-y:auto"><span style="color:#484f58;padding:10px">No data</span></div></div>

  <div id="charts" style="display:flex;gap:8px;min-height:200px">
    <div class="chart-box"><canvas id="ch-rate"></canvas></div>
    <div class="chart-box"><canvas id="ch-lat"></canvas></div>
    <div class="chart-box"><canvas id="ch-frames"></canvas></div>
  </div>
</div>

<script src="https://d3js.org/d3.v7.min.js">
// If CDN fails, D3 won't be available — topology graph will show a message
</script>
<script>
// ── State ──────────────────────────────────────────────────
let topoData = {nodes:[],metrics:{}};
let frames = [];
let paused = false;
let frameCount = 0;
let chartHistory = {rate:[],latency:[],frames:[],maxLen:120};
let serverUrl = 'http://localhost:8800';
let eventSource = null;

const COLORS = {1:'#3fb950',2:'#58a6ff',4:'#d29922',8:'#bc8cff',0:'#f85149'};

// ── Demo data ──────────────────────────────────────────────
function doSimulate(){
  // Pre-populate chart history so lines are visible immediately
  chartHistory = {rate:[],latency:[],frames:[],maxLen:120};
  for(let i=0;i<30;i++){
    chartHistory.rate.push(800+Math.random()*400);
    chartHistory.latency.push(100+Math.random()*200);
    chartHistory.frames.push(700+Math.random()*600);
  }
  topoData = {
    nodes:[
      {name:"perception",pid:1001,alive:true,caps:1,topics:[{topic:"sensor/lidar",freq:10},{topic:"sensor/gps",freq:5}]},
      {name:"radar",pid:1005,alive:true,caps:1,topics:[{topic:"sensor/radar",freq:20}]},
      {name:"fusion",pid:1002,alive:true,caps:9,topics:[{topic:"sensor/lidar",freq:0},{topic:"sensor/gps",freq:0},{topic:"sensor/radar",freq:0},{topic:"fusion/objects",freq:10}]},
      {name:"control",pid:1003,alive:true,caps:2,topics:[{topic:"fusion/objects",freq:0},{topic:"control/cmd",freq:0}]},
      {name:"planning",pid:1004,alive:Math.random()>0.3,caps:2,topics:[{topic:"fusion/objects",freq:0}]}
    ],
    metrics:{bus:{published:1250,delivered:2480,dropped:0},transport:{local_pub:1250,remote_pub:0},scheduler:{tasks:5,mode:"CHOREO"},latency:{avg_us:145,p50_us:120,p99_us:450},driver_mode:"ACC",
      topics:[
        {topic:"sensor/lidar",pub:500,del:1000,drop:0,lat_us:145,freq:10.0,subs:2,reliability:"best_effort",deadline_ms:0,transport:"shm"},
        {topic:"sensor/gps",pub:250,del:250,drop:0,lat_us:168,freq:5.0,subs:1,reliability:"best_effort",deadline_ms:0,transport:"shm"},
        {topic:"sensor/radar",pub:1000,del:2000,drop:2,lat_us:95,freq:20.0,subs:2,reliability:"best_effort",deadline_ms:0,transport:"shm"},
        {topic:"fusion/objects",pub:500,del:1000,drop:0,lat_us:120,freq:10.0,subs:2,reliability:"reliable",deadline_ms:100,transport:"shm"},
        {topic:"control/cmd",pub:200,del:200,drop:0,lat_us:85,freq:100.0,subs:1,reliability:"reliable",deadline_ms:20,transport:"dds"}
      ]},
    endpoints:[
      {node:"perception",topic:"sensor/lidar",role:"pub",type_id:"0xd712aa51",freq:10.0},
      {node:"perception",topic:"sensor/gps",role:"pub",type_id:"0x0596b0b7",freq:5.0},
      {node:"radar",topic:"sensor/radar",role:"pub",type_id:"0xaabbccdd",freq:20.0},
      {node:"fusion",topic:"sensor/lidar",role:"sub",type_id:"0xd712aa51",freq:0},
      {node:"fusion",topic:"sensor/gps",role:"sub",type_id:"0x0596b0b7",freq:0},
      {node:"fusion",topic:"sensor/radar",role:"sub",type_id:"0xaabbccdd",freq:0},
      {node:"fusion",topic:"fusion/objects",role:"pub",type_id:"0xf0ed10c0",freq:10.0},
      {node:"control",topic:"fusion/objects",role:"sub",type_id:"0xf0ed10c0",freq:0},
      {node:"control",topic:"control/cmd",role:"pub",type_id:"0x2d95c6d2",freq:100.0,reliability:"reliable",deadline_ms:20}
    ]
  };
  updateAll();
  document.getElementById('conn-dot').className='live';document.getElementById('conn-dot').textContent='● demo';
  document.getElementById('conn-label').textContent='| demo mode';
}

// ── Connection ─────────────────────────────────────────────
async function doConnect(){
  serverUrl = document.getElementById('url').value.trim();
  if(eventSource){eventSource.close();eventSource=null;}

  try{
    const r = await fetch(serverUrl+'/api/topology');
    topoData = await r.json();
    updateAll();
    document.getElementById('conn-dot').className='live';document.getElementById('conn-dot').textContent='● live';
    document.getElementById('conn-label').textContent='| '+serverUrl;

    // SSE stream
    eventSource = new EventSource(serverUrl+'/api/stream');
    eventSource.onmessage = e => {
      if(paused) return;
      try{topoData=JSON.parse(e.data);updateAll()}catch(err){}
    };
    eventSource.onerror = ()=>{
      document.getElementById('conn-dot').className='warn';document.getElementById('conn-dot').textContent='● retry';
      if(eventSource){eventSource.close();eventSource=null;}
      // Poll fallback
      setTimeout(pollFallback,2000);
    };
  }catch(err){
    document.getElementById('conn-dot').className='dead';document.getElementById('conn-dot').textContent='● offline';
    console.log('Connection failed, using demo data');
    doSimulate();
  }
}

function pollFallback(){
  if(eventSource||paused) return;
  fetch(serverUrl+'/api/topology').then(r=>r.json()).then(d=>{topoData=d;updateAll()}).catch(()=>{});
  setTimeout(pollFallback,2000);
}

function doPause(){paused=!paused;document.getElementById('pause-btn').textContent=paused?'▶ Resume':'⏯ Pause'}

// ── Update ─────────────────────────────────────────────────
function updateAll(){
  updateMetrics();
  updateFrames();
  updateTopicStats();
  updateProcessTopics();
  updateTopo();
  updateCharts();
  document.getElementById('node-n').textContent=(topoData.nodes||[]).length;
  document.getElementById('frame-n').textContent=frameCount;
}

function updateMetrics(){
  const m=topoData.metrics||{},b=m.bus||{},l=m.latency||{};
  document.getElementById('m-pub').textContent = (b.published||0).toLocaleString();
  document.getElementById('m-del').textContent = (b.delivered||0).toLocaleString();
  document.getElementById('m-drop').textContent = (b.dropped||0);
  document.getElementById('m-drop').style.color = (b.dropped||0) > 0 ? '#f85149' : '#3fb950';
  document.getElementById('m-lat').textContent = (l.avg_us||0);
  const ns=topoData.nodes||[];
  document.getElementById('node-status').innerHTML=ns.map(n=>
    `<div class="stat"><span title="${n.description||''}">${n.name}</span><span style="color:${n.alive===false?'#f85149':'#3fb950'}">${n.alive===false?'💀 Dead':'🟢 PID '+(n.pid||'—')}</span></div>`
  ).join('')||'<span style="color:#484f58">No nodes</span>';
}

function updateFrames(){
  const m=topoData.metrics||{},b=m.bus||{};
  const now=new Date().toISOString().slice(11,23);
  frames.push({ts:now,pub:b.published||0,del:b.delivered||0,drop:b.dropped||0,mode:m.driver_mode||'NA',lat:(m.latency||{}).avg_us||0});
  if(frames.length>200) frames.shift();
  frameCount++;
  document.getElementById('frames').innerHTML = frames.slice(-60).reverse().map(f=>
    `<div class="frame-line">
      <span style="color:#484f58;min-width:70px">${f.ts}</span>
      <span style="color:#58a6ff;min-width:60px">pub:${f.pub}</span>
      <span style="min-width:60px">del:${f.del}</span>
      <span style="color:${f.drop?'#f85149':'#484f58'};min-width:50px">drop:${f.drop}</span>
      <span style="color:#d29922;min-width:60px">lat:${f.lat}µs</span>
      <span style="min-width:40px">${f.mode}</span>
    </div>`
  ).join('')||'<span style="color:#484f58">Waiting...</span>';
}

// ── Topology (D3 force) ────────────────────────────────────
let topoInit=false;
function topicFilter(){
  const raw = document.getElementById('topic-filter')?.value?.trim() || '';
  return raw ? raw.split(',').map(s=>s.trim()).filter(Boolean) : [];
}
function topicMatches(topicName){
  const f = topicFilter();
  return f.length === 0 || f.some(p => topicName.includes(p) || p.includes(topicName));
}
function updateTopicStats(){
  const ts = (topoData.metrics?.topics || topoData.topics || []).filter(t => topicMatches(t.topic||t.name||''));
  if (!ts.length) {
    document.getElementById('topic-stats').innerHTML = '<span style="color:#484f58">Waiting for per-topic data...</span>';
    return;
  }
  document.getElementById('topic-stats').innerHTML =
    '<table style="width:100%;font-size:10px;border-collapse:collapse">' +
    '<tr style="color:#8b949e;border-bottom:1px solid#21262d">' +
    '<th style="text-align:left;padding:2px 3px">Topic</th>' +
    '<th style="text-align:center;padding:2px 3px">Reliability</th>' +
    '<th style="text-align:right;padding:2px 3px">Pub</th>' +
    '<th style="text-align:right;padding:2px 3px">Del</th>' +
    '<th style="text-align:right;padding:2px 3px">Drop</th>' +
    '<th style="text-align:right;padding:2px 3px">Lat</th>' +
    '<th style="text-align:right;padding:2px 3px">Freq</th>' +
    '<th style="text-align:right;padding:2px 3px">Deadline</th>' +
    '</tr>' +
    ts.map(t => {
      const short = (t.topic||t.name||'?').split('/').pop();
      const dropColor = (t.drop||0) > 0 ? 'color:#f85149' : 'color:#3fb950';
      const reliability = t.reliability || t.qos_reliability || 'best_effort';
      const relColor = reliability === 'reliable' ? 'color:#3fb950' : 'color:#8b949e';
      const deadline = t.deadline_ms || t.qos_deadline_ms || 0;
      const dlColor = deadline > 0 ? 'color:#d29922' : 'color:#484f58';
      return `<tr style="border-bottom:1px solid#161b22">
        <td style="padding:2px 3px;color:#58a6ff" title="${t.topic||t.name}">${short}</td>
        <td style="text-align:center;padding:2px 3px;font-size:9px;${relColor}">${reliability}</td>
        <td style="text-align:right;padding:2px 3px">${t.pub||0}</td>
        <td style="text-align:right;padding:2px 3px">${t.del||0}</td>
        <td style="text-align:right;padding:2px 3px;${dropColor}">${t.drop||0}</td>
        <td style="text-align:right;padding:2px 3px;color:#d29922">${(t.lat_us||0)}µs</td>
        <td style="text-align:right;padding:2px 3px">${(t.freq||0).toFixed(1)}Hz</td>
        <td style="text-align:right;padding:2px 3px;${dlColor}">${deadline>0?deadline+'ms':'—'}</td>
      </tr>`;
    }).join('') + '</table>';
}

function roleClass(role){return 'role role-'+(role||'unknown')}
function endpointRoleFromCaps(t){
  if(t.role) return t.role;
  const c=Number(t.caps||t.capabilities||0);
  if((c&1)&&(c&2)) return 'pubsub';
  if(c&1) return 'pub';
  if(c&2) return 'sub';
  if(Number(t.freq||0)>0) return 'pub';
  return 'unknown';
}
function updateProcessTopics(){
  let endpoints = (topoData.endpoints || []).filter(e => topicMatches(e.topic||''));
  if(!endpoints.length){
    (topoData.nodes||[]).forEach(n=>{
      (n.topics||[]).forEach(t=>endpoints.push({node:n.name,topic:t.topic||t.name,role:endpointRoleFromCaps(t),type_id:t.type_id||'0x00000000',freq:Number(t.freq||0)}));
    });
  }
  if(!endpoints.length){
    document.getElementById('process-topics').innerHTML='<span class="muted">Waiting for registry/discovery endpoints...</span>';
    return;
  }
  document.getElementById('process-topics').innerHTML =
    '<table style="width:100%;font-size:10px;border-collapse:collapse">'+
    '<tr style="color:#8b949e;border-bottom:1px solid#21262d"><th style="text-align:left;padding:3px 4px">Process</th><th style="text-align:left;padding:3px 4px">Role</th><th style="text-align:left;padding:3px 4px">Topic</th><th style="text-align:left;padding:3px 4px">Type</th><th style="text-align:right;padding:3px 4px">Freq</th><th style="text-align:right;padding:3px 4px">Drop</th><th style="text-align:right;padding:3px 4px">Lat</th></tr>'+
    endpoints.sort((a,b)=>(a.node||'').localeCompare(b.node||'')||(a.topic||'').localeCompare(b.topic||'')).map(e=>{
      const role=e.role||'unknown';
      const drop=Number(e.drop||0);
      return `<tr style="border-bottom:1px solid#161b22">
        <td style="padding:3px 4px;color:#c9d1d9">${e.node||'?'}</td>
        <td style="padding:3px 4px"><span class="${roleClass(role)}">${role}</span></td>
        <td style="padding:3px 4px" class="topic-full">${e.topic||'?'}</td>
        <td style="padding:3px 4px" class="muted mono">${e.type_id||'—'}</td>
        <td style="text-align:right;padding:3px 4px">${Number(e.freq||0).toFixed(1)}Hz</td>
        <td style="text-align:right;padding:3px 4px;color:${drop?'#f85149':'#3fb950'}">${drop}</td>
        <td style="text-align:right;padding:3px 4px;color:#d29922">${Number(e.lat_us||0)}µs</td>
      </tr>`;
    }).join('')+'</table>';
}

function updateTopo(){
  const ns=(topoData.nodes||[]).map((n,i)=>({...n,id:i,x:Math.random()*400+100,y:Math.random()*300+100}));
  const el=document.getElementById('topo');
  const msg=document.getElementById('msg');
  if(!ns.length){if(msg)msg.style.display='block';return}
  if(msg)msg.style.display='none';

  if(typeof d3==='undefined'){el.innerHTML='<div style="padding:20px;color:#f85149">D3.js not loaded (CDN unreachable). Try Demo Data for text view.</div>';return}

  const links=[];
  const topicToPub={}, topicToSub={};
  ns.forEach((n,i)=>(n.topics||[]).forEach(t=>{
    const topic=t.topic||t.name; if(!topic) return;
    const role=endpointRoleFromCaps(t);
    if(role==='pub'||role==='pubsub') (topicToPub[topic] ||= []).push(i);
    if(role==='sub'||role==='pubsub') (topicToSub[topic] ||= []).push(i);
  }));
  Object.keys(topicToPub).forEach(topic=>{
    (topicToPub[topic]||[]).forEach(p=>(topicToSub[topic]||[]).forEach(s=>{if(p!==s)links.push({source:p,target:s,topic})}));
  });
  if(!links.length){
    for(let i=0;i<ns.length;i++)for(let j=i+1;j<ns.length;j++){
      const shared=(ns[i].topics||[]).filter(ti=>(ns[j].topics||[]).some(tj=>(tj.topic||tj.name)===(ti.topic||ti.name)));
      shared.forEach(t=>links.push({source:i,target:j,topic:t.topic||t.name}));
    }
  }

  el.innerHTML='';
  const svg=d3.select('#topo').append('svg').attr('width','100%').attr('height','100%');
  const g=svg.append('g');
  svg.call(d3.zoom().scaleExtent([0.15,4]).on('zoom',e=>g.attr('transform',e.transform)));

  const linkG=g.append('g').selectAll('line').data(links).join('line').attr('class','link');
  const linkL=g.append('g').selectAll('text').data(links).join('text')
    .attr('font-size','8px').attr('fill','#484f58').text(d=>d.topic.split('/').pop());

  const nodeG=g.append('g').selectAll('g').data(ns).join('g').call(
    d3.drag().on('start',(e,d)=>{if(!e.sourceEvent.ctrlKey){sim.alphaTarget(0.3).restart();d.fx=d.x;d.fy=d.y}})
      .on('drag',(e,d)=>{d.fx=e.x;d.fy=e.y}).on('end',(e,d)=>{if(!e.sourceEvent.ctrlKey){d.fx=null;d.fy=null}})
  );
  nodeG.append('circle').attr('r',20).attr('fill',d=>d.alive===false?'#484f58':COLORS[(d.caps||0)&8?8:(d.caps||0)&4?4:(d.caps||0)&2?2:1])
    .attr('stroke','#21262d').attr('stroke-width',2).append('title').text(d=>d.name+' (PID '+(d.pid||'—')+')\n'+(d.description||'')+'\n'+(d.plugin||''));
  nodeG.append('text').text(d=>d.name).attr('text-anchor','middle').attr('dy',30).attr('fill','#c9d1d9').attr('font-size','9px');

  const sim=d3.forceSimulation(ns).force('link',d3.forceLink(links).distance(160))
    .force('charge',d3.forceManyBody().strength(-350)).force('center',d3.forceCenter(400,200)).force('collision',d3.forceCollide(40))
    .on('tick',()=>{
      linkG.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
      linkL.attr('x',d=>(d.source.x+d.target.x)/2).attr('y',d=>(d.source.y+d.target.y)/2-5);
      nodeG.attr('transform',d=>`translate(${d.x},${d.y})`);
    });
  sim.alpha(1).restart();
  setTimeout(()=>svg.transition().duration(500).call(d3.zoom().transform,d3.zoomIdentity),100);
}

// ── Charts (Canvas) ────────────────────────────────────────
function updateCharts(){
  const m=topoData.metrics||{},b=m.bus||{},l=m.latency||{};
  chartHistory.rate.push(b.published||0);
  chartHistory.latency.push(l.avg_us||0);
  chartHistory.frames.push(b.delivered||0);
  [chartHistory.rate,chartHistory.latency,chartHistory.frames].forEach(a=>{while(a.length>chartHistory.maxLen)a.shift()});

  drawChart('ch-rate',chartHistory.rate,'#58a6ff','Message Rate');
  drawChart('ch-lat',chartHistory.latency,'#d29922','Latency (µs)');
  drawChart('ch-frames',chartHistory.frames,'#3fb950','Throughput');
}

function drawChart(id,data,color,unit){
  const c=document.getElementById(id);if(!c)return;
  const box=c.parentElement,W=box.clientWidth,H=box.clientHeight;
  if(W<10||H<10)return;
  c.width=W*2;c.height=H*2;c.style.width=W+'px';c.style.height=H+'px';
  const ctx=c.getContext('2d');ctx.scale(2,2);
  const pad={t:28,r:12,b:22,l:44},w=W-pad.l-pad.r,h=H-pad.t-pad.b;
  ctx.clearRect(0,0,W,H);

  // Background
  ctx.fillStyle='#0d1117';ctx.fillRect(0,0,W,H);

  // Grid lines
  ctx.strokeStyle='#161b22';ctx.lineWidth=0.5;
  const steps=4;
  for(let i=0;i<=steps;i++){const y=pad.t+h*i/steps;ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke()}

  if(data.length<2){
    ctx.fillStyle='#484f58';ctx.font='12px system-ui';ctx.textAlign='center';
    ctx.fillText('Waiting for data...',W/2,H/2);
    return;
  }

  const max=Math.max(...data,1),min=Math.min(...data,0);
  const range=max-min||1;
  const xs=w/(data.length-1),ys=h/range;

  // Area fill
  ctx.fillStyle=color+'18';
  ctx.beginPath();
  data.forEach((v,i)=>{
    const x=pad.l+i*xs,y=pad.t+(max-v)*ys;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  });
  ctx.lineTo(pad.l+(data.length-1)*xs,pad.t+h);
  ctx.lineTo(pad.l,pad.t+h);
  ctx.closePath();ctx.fill();

  // Line
  ctx.strokeStyle=color;ctx.lineWidth=2;ctx.beginPath();
  data.forEach((v,i)=>{
    const x=pad.l+i*xs,y=pad.t+(max-v)*ys;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  });
  ctx.stroke();

  // Y-axis labels (top and bottom only, no overlap)
  ctx.fillStyle='#8b949e';ctx.font='10px system-ui';ctx.textAlign='right';
  ctx.fillText(Math.round(max),pad.l-6,pad.t+12);
  ctx.fillText(Math.round(min),pad.l-6,H-pad.b+4);

  // Unit label (top-left inside chart)
  ctx.textAlign='left';
  ctx.fillText(unit,pad.l+4,pad.t-6);
}

// ── Init ───────────────────────────────────────────────────
// Auto-connect to monitor server (flowmond or flow_e2e embedded)
doConnect().catch(() => {
  // Fallback: demo data if no server running
  doSimulate();
});

// Update simulation data periodically for live charts
setInterval(()=>{
  if(!eventSource && !paused){
    const m=topoData.metrics||{},b=m.bus||{},l=m.latency||{};
    b.published = (b.published||1000) + Math.floor(Math.random()*50-25);
    b.delivered = (b.delivered||2000) + Math.floor(Math.random()*100-50);
    b.dropped   = Math.random()<0.05 ? b.dropped+1 : b.dropped;
    l.avg_us    = Math.max(80, (l.avg_us||150) + Math.floor(Math.random()*20-10));
    l.p99_us    = Math.max(200, (l.p99_us||400) + Math.floor(Math.random()*60-30));
    updateAll();
  }
},1000);
</script>
