<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>FlowBoard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;color:#c9d1d9;font:13px system-ui,sans-serif;padding:16px;min-height:100vh}
h1{color:#58a6ff;font-size:18px;margin-bottom:16px}
h1 span{color:#8b949e;font-size:12px;font-weight:400}
#status{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
#status span{padding:3px 10px;border-radius:12px;font-size:11px}
.live{background:#122d15;color:#3fb950}.dead{background:#2d1215;color:#f85149}.warn{background:#2d1a12;color:#d29922}
.row{display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap}
.card{background:#161b22;border:1px solid#21262d;border-radius:8px;padding:12px;min-width:300px}
.card h2{font-size:12px;color:#8b949e;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
#topo{width:100%;height:400px;background:#0d1117;border:1px solid#21262d;border-radius:8px;position:relative;overflow:hidden}
#topo svg{width:100%;height:100%}
#frames{height:300px;overflow-y:auto;font:10px 'JetBrains Mono',monospace;background:#0d1117;border:1px solid#21262d;border-radius:8px;padding:6px}
#charts{display:flex;gap:8px;flex-wrap:wrap}
.chart-box{flex:1;min-width:280px;height:200px;background:#0d1117;border:1px solid#21262d;border-radius:8px;position:relative}
.chart-box canvas{width:100%;height:100%}
.chart-box label{position:absolute;top:4px;left:8px;font-size:10px;color:#8b949e;z-index:1}
.stat{display:flex;justify-content:space-between;padding:2px 0;font-size:11px;border-bottom:1px solid#161b22}
.stat .v{color:#58a6ff;font-weight:600}
button,input{background:#21262d;color:#c9d1d9;border:1px solid#30363d;padding:6px 12px;border-radius:4px;cursor:pointer;font-size:12px}
button:hover{background:#30363d}
input{width:240px;font:11px monospace}
#msg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#484f58;font-size:14px;pointer-events:none}
.link{stroke:#21262d;stroke-width:1.2;fill:none}
.frame-line{display:flex;gap:6px;padding:1px 4px;border-bottom:1px solid#0d1117;white-space:nowrap}
.frame-line:hover{background:#161b22}
</style>
</head>
<body>

<h1>🔗 FlowBoard <span id="conn-label">| offline</span></h1>

<div id="status">
  <span id="conn-dot" class="dead">● offline</span>
  <span>Nodes: <b id="node-n">0</b></span>
  <span>Frames: <b id="frame-n">0</b></span>
  <span>Rate: <b id="rate-n">0</b> fps</span>
</div>

<div style="display:flex;gap:8px;margin-bottom:12px;align-items:center">
  <input id="url" value="http://localhost:8800" placeholder="Server URL">
  <button onclick="doConnect()" style="background:#1f6feb;border-color:#1f6feb">🔗 Connect</button>
  <button onclick="doSimulate()">📋 Demo Data</button>
  <button onclick="doPause()" id="pause-btn">⏯ Pause</button>
</div>

<div class="row">
  <div style="flex:2;min-width:400px">
    <div class="card" style="padding:0"><h2 style="padding:12px 12px 0">Topology</h2><div id="topo"><div id="msg">Press "Demo Data" or "Connect" to load</div></div></div>
  </div>
  <div style="flex:1;min-width:280px">
    <div class="card"><h2>Metrics</h2><div id="metrics"><span style="color:#484f58">No data</span></div></div>
    <div class="card" style="margin-top:12px"><h2>Status</h2><div id="node-status"><span style="color:#484f58">No data</span></div></div>
  </div>
</div>

<div class="row">
  <div style="flex:2;min-width:400px">
    <div class="card" style="padding:0"><h2 style="padding:12px 12px 0">Frame Monitor</h2><div id="frames"><span style="color:#484f58">No data</span></div></div>
  </div>
</div>

<div class="row" style="min-height:220px">
  <div id="charts" style="display:flex;gap:8px;width:100%;min-height:200px">
    <div class="chart-box" style="flex:1;min-width:250px"><label>Message Rate (msg/s)</label><canvas id="ch-rate"></canvas></div>
    <div class="chart-box" style="flex:1;min-width:250px"><label>E2E Latency (µs)</label><canvas id="ch-lat"></canvas></div>
    <div class="chart-box" style="flex:1;min-width:250px"><label>Frame Throughput</label><canvas id="ch-frames"></canvas></div>
  </div>
</div>

<script src="https://d3js.org/d3.v7.min.js">
// If CDN fails, D3 won't be available — topology graph will show a message
</script>
<script>
// ── State ──────────────────────────────────────────────────
let topoData = {nodes:[],metrics:{}};
let frames = [];
let paused = false;
let frameCount = 0;
let chartHistory = {rate:[],latency:[],frames:[],maxLen:120};
let serverUrl = 'http://localhost:8800';
let eventSource = null;

const COLORS = {1:'#3fb950',2:'#58a6ff',4:'#d29922',8:'#bc8cff',0:'#f85149'};

// ── Demo data ──────────────────────────────────────────────
function doSimulate(){
  // Pre-populate chart history so lines are visible immediately
  chartHistory = {rate:[],latency:[],frames:[],maxLen:120};
  for(let i=0;i<30;i++){
    chartHistory.rate.push(800+Math.random()*400);
    chartHistory.latency.push(100+Math.random()*200);
    chartHistory.frames.push(700+Math.random()*600);
  }
  topoData = {
    nodes:[
      {name:"perception",pid:1001,alive:true,caps:1,topics:[{topic:"sensor/lidar",freq:10},{topic:"sensor/gps",freq:5}]},
      {name:"radar",pid:1005,alive:true,caps:1,topics:[{topic:"sensor/radar",freq:20}]},
      {name:"fusion",pid:1002,alive:true,caps:9,topics:[{topic:"sensor/lidar",freq:0},{topic:"sensor/gps",freq:0},{topic:"sensor/radar",freq:0},{topic:"fusion/objects",freq:10}]},
      {name:"control",pid:1003,alive:true,caps:2,topics:[{topic:"fusion/objects",freq:0},{topic:"control/cmd",freq:0}]},
      {name:"planning",pid:1004,alive:Math.random()>0.3,caps:2,topics:[{topic:"fusion/objects",freq:0}]}
    ],
    metrics:{bus:{published:1250,delivered:2480,dropped:0},transport:{local_pub:1250,remote_pub:0},scheduler:{tasks:5,mode:"CHOREO"},latency:{avg_us:145,p50_us:120,p99_us:450},driver_mode:"ACC"}
  };
  updateAll();
  document.getElementById('conn-dot').className='live';document.getElementById('conn-dot').textContent='● demo';
  document.getElementById('conn-label').textContent='| demo mode';
}

// ── Connection ─────────────────────────────────────────────
async function doConnect(){
  serverUrl = document.getElementById('url').value.trim();
  if(eventSource){eventSource.close();eventSource=null;}

  try{
    const r = await fetch(serverUrl+'/api/topology');
    topoData = await r.json();
    updateAll();
    document.getElementById('conn-dot').className='live';document.getElementById('conn-dot').textContent='● live';
    document.getElementById('conn-label').textContent='| '+serverUrl;

    // SSE stream
    eventSource = new EventSource(serverUrl+'/api/stream');
    eventSource.onmessage = e => {
      if(paused) return;
      try{topoData=JSON.parse(e.data);updateAll()}catch(err){}
    };
    eventSource.onerror = ()=>{
      document.getElementById('conn-dot').className='warn';document.getElementById('conn-dot').textContent='● retry';
      if(eventSource){eventSource.close();eventSource=null;}
      // Poll fallback
      setTimeout(pollFallback,2000);
    };
  }catch(err){
    document.getElementById('conn-dot').className='dead';document.getElementById('conn-dot').textContent='● offline';
    console.log('Connection failed, using demo data');
    doSimulate();
  }
}

function pollFallback(){
  if(eventSource||paused) return;
  fetch(serverUrl+'/api/topology').then(r=>r.json()).then(d=>{topoData=d;updateAll()}).catch(()=>{});
  setTimeout(pollFallback,2000);
}

function doPause(){paused=!paused;document.getElementById('pause-btn').textContent=paused?'▶ Resume':'⏯ Pause'}

// ── Update ─────────────────────────────────────────────────
function updateAll(){
  updateMetrics();
  updateFrames();
  updateTopo();
  updateCharts();
  document.getElementById('node-n').textContent=(topoData.nodes||[]).length;
  document.getElementById('frame-n').textContent=frameCount;
}

function updateMetrics(){
  const m=topoData.metrics||{},b=m.bus||{},t=m.transport||{},l=m.latency||{};
  document.getElementById('metrics').innerHTML=`
    <div class="stat"><span>Bus Published</span><span class="v">${b.published||0}</span></div>
    <div class="stat"><span>Bus Delivered</span><span class="v">${b.delivered||0}</span></div>
    <div class="stat"><span>Bus Dropped</span><span class="v" style="color:${b.dropped?'#f85149':'#3fb950'}">${b.dropped||0}</span></div>
    <div class="stat"><span>Latency avg</span><span class="v">${l.avg_us||0} µs</span></div>
    <div class="stat"><span>Latency p99</span><span class="v">${l.p99_us||0} µs</span></div>
    <div class="stat"><span>Driver Mode</span><span class="v">${m.driver_mode||'NA'}</span></div>
    <div class="stat"><span>Scheduler</span><span class="v">${(m.scheduler||{}).mode||'?'}</span></div>
  `;
  const ns=topoData.nodes||[];
  document.getElementById('node-status').innerHTML=ns.map(n=>
    `<div class="stat"><span>${n.name}</span><span style="color:${n.alive===false?'#f85149':'#3fb950'}">${n.alive===false?'💀 Dead':'🟢 PID '+n.pid}</span></div>`
  ).join('')||'<span style="color:#484f58">No nodes</span>';
}

function updateFrames(){
  const m=topoData.metrics||{},b=m.bus||{};
  const now=new Date().toISOString().slice(11,23);
  frames.push({ts:now,pub:b.published||0,del:b.delivered||0,drop:b.dropped||0,mode:m.driver_mode||'NA',lat:(m.latency||{}).avg_us||0});
  if(frames.length>200) frames.shift();
  frameCount++;
  document.getElementById('frames').innerHTML = frames.slice(-60).reverse().map(f=>
    `<div class="frame-line">
      <span style="color:#484f58;min-width:70px">${f.ts}</span>
      <span style="color:#58a6ff;min-width:60px">pub:${f.pub}</span>
      <span style="min-width:60px">del:${f.del}</span>
      <span style="color:${f.drop?'#f85149':'#484f58'};min-width:50px">drop:${f.drop}</span>
      <span style="color:#d29922;min-width:60px">lat:${f.lat}µs</span>
      <span style="min-width:40px">${f.mode}</span>
    </div>`
  ).join('')||'<span style="color:#484f58">Waiting...</span>';
}

// ── Topology (D3 force) ────────────────────────────────────
let topoInit=false;
function updateTopo(){
  const ns=(topoData.nodes||[]).map((n,i)=>({...n,id:i,x:Math.random()*400+100,y:Math.random()*300+100}));
  const el=document.getElementById('topo');
  const msg=document.getElementById('msg');
  if(!ns.length){if(msg)msg.style.display='block';return}
  if(msg)msg.style.display='none';

  if(typeof d3==='undefined'){el.innerHTML='<div style="padding:20px;color:#f85149">D3.js not loaded (CDN unreachable). Try Demo Data for text view.</div>';return}

  const links=[];
  for(let i=0;i<ns.length;i++)for(let j=i+1;j<ns.length;j++){
    const shared=ns[i].topics.filter(ti=>ns[j].topics.some(tj=>tj.topic===ti.topic));
    shared.forEach(t=>links.push({source:i,target:j,topic:t.topic}));
  }

  el.innerHTML='';
  const svg=d3.select('#topo').append('svg').attr('width','100%').attr('height','100%');
  const g=svg.append('g');
  svg.call(d3.zoom().scaleExtent([0.15,4]).on('zoom',e=>g.attr('transform',e.transform)));

  const linkG=g.append('g').selectAll('line').data(links).join('line').attr('class','link');
  const linkL=g.append('g').selectAll('text').data(links).join('text')
    .attr('font-size','8px').attr('fill','#484f58').text(d=>d.topic.split('/').pop());

  const nodeG=g.append('g').selectAll('g').data(ns).join('g').call(
    d3.drag().on('start',(e,d)=>{if(!e.sourceEvent.ctrlKey){sim.alphaTarget(0.3).restart();d.fx=d.x;d.fy=d.y}})
      .on('drag',(e,d)=>{d.fx=e.x;d.fy=e.y}).on('end',(e,d)=>{if(!e.sourceEvent.ctrlKey){d.fx=null;d.fy=null}})
  );
  nodeG.append('circle').attr('r',20).attr('fill',d=>d.alive===false?'#484f58':COLORS[(d.caps||0)&8?8:(d.caps||0)&4?4:(d.caps||0)&2?2:1])
    .attr('stroke','#21262d').attr('stroke-width',2).append('title').text(d=>d.name+' (PID '+d.pid+')');
  nodeG.append('text').text(d=>d.name).attr('text-anchor','middle').attr('dy',30).attr('fill','#c9d1d9').attr('font-size','9px');

  const sim=d3.forceSimulation(ns).force('link',d3.forceLink(links).distance(160))
    .force('charge',d3.forceManyBody().strength(-350)).force('center',d3.forceCenter(400,200)).force('collision',d3.forceCollide(40))
    .on('tick',()=>{
      linkG.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
      linkL.attr('x',d=>(d.source.x+d.target.x)/2).attr('y',d=>(d.source.y+d.target.y)/2-5);
      nodeG.attr('transform',d=>`translate(${d.x},${d.y})`);
    });
  sim.alpha(1).restart();
  setTimeout(()=>svg.transition().duration(500).call(d3.zoom().transform,d3.zoomIdentity),100);
}

// ── Charts (Canvas) ────────────────────────────────────────
function updateCharts(){
  const m=topoData.metrics||{},b=m.bus||{},l=m.latency||{};
  chartHistory.rate.push(b.published||0);
  chartHistory.latency.push(l.avg_us||0);
  chartHistory.frames.push(b.delivered||0);
  [chartHistory.rate,chartHistory.latency,chartHistory.frames].forEach(a=>{while(a.length>chartHistory.maxLen)a.shift()});

  drawChart('ch-rate',chartHistory.rate,'#58a6ff','msg/s');
  drawChart('ch-lat',chartHistory.latency,'#d29922','µs');
  drawChart('ch-frames',chartHistory.frames,'#3fb950','frames');
}

function drawChart(id,data,color,unit){
  const c=document.getElementById(id);if(!c)return;
  const box=c.parentElement,W=box.clientWidth,H=box.clientHeight;
  if(W<10||H<10)return;
  c.width=W*2;c.height=H*2;c.style.width=W+'px';c.style.height=H+'px';
  const ctx=c.getContext('2d');ctx.scale(2,2);
  const pad={t:24,r:8,b:20,l:40},w=W-pad.l-pad.r,h=H-pad.t-pad.b;
  ctx.clearRect(0,0,W,H);

  // Grid
  ctx.strokeStyle='#161b22';ctx.lineWidth=0.5;
  for(let i=0;i<=4;i++){const y=pad.t+h*i/4;ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke()}

  if(data.length<2){
    ctx.fillStyle='#484f58';ctx.font='12px system-ui';ctx.textAlign='center';
    ctx.fillText('Waiting...',W/2,H/2);
    return;
  }

  const max=Math.max(...data,1),min=Math.min(...data,0);
  const xs=w/(data.length-1),ys=h/(max-min||1);

  // Line
  ctx.strokeStyle=color;ctx.lineWidth=1.5;ctx.beginPath();
  data.forEach((v,i)=>{
    const x=pad.l+i*xs,y=pad.t+(max-v)*ys;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  });
  ctx.stroke();

  // Labels
  ctx.fillStyle='#8b949e';ctx.font='9px system-ui';ctx.textAlign='right';
  ctx.fillText(max,pad.l-4,pad.t+10);
  ctx.fillText(min,pad.l-4,H-pad.b);
  ctx.textAlign='left';
  ctx.fillText(unit,pad.l,pad.t-6);
}

// ── Init ───────────────────────────────────────────────────
doSimulate();  // Always start with demo data so page is never blank

// Update simulation data periodically for live charts
setInterval(()=>{
  if(!eventSource && !paused){
    const m=topoData.metrics||{},b=m.bus||{},l=m.latency||{};
    b.published = (b.published||1000) + Math.floor(Math.random()*50-25);
    b.delivered = (b.delivered||2000) + Math.floor(Math.random()*100-50);
    b.dropped   = Math.random()<0.05 ? b.dropped+1 : b.dropped;
    l.avg_us    = Math.max(80, (l.avg_us||150) + Math.floor(Math.random()*20-10));
    l.p99_us    = Math.max(200, (l.p99_us||400) + Math.floor(Math.random()*60-30));
    updateAll();
  }
},1000);
</script>
</body>
</html>
